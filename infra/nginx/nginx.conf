events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Industrial Platform Frontend
    upstream industrial_fe {
        server industrial-frontend:80;
    }

    # Supply Chain Platform Frontend
    upstream supply_fe {
        server supply-frontend:80;
    }

    # Park Service Platform Frontend
    upstream park_fe {
        server park-frontend:80;
    }

    # Backend Services
    upstream industrial_be {
        server industrial-backend:5000;
    }

    upstream supply_be {
        server supply-backend:5000;
    }

    upstream park_be {
        server park-backend:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # Industrial Platform Frontend (default)
        location / {
            proxy_pass http://industrial_fe;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Supply Chain Frontend
        location /supply/ {
            proxy_pass http://supply_fe;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Park Service Frontend
        location /park/ {
            proxy_pass http://park_fe;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Industrial Backend API
        location /api/industrial/ {
            proxy_pass http://industrial_be/api/industrial/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Supply Chain Backend API
        location /api/supply/ {
            proxy_pass http://supply_be/api/supply/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Park Service Backend API
        location /api/park/ {
            proxy_pass http://park_be/api/park/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Auth API (shared, routed to industrial backend which hosts auth)
        location /api/auth/ {
            proxy_pass http://industrial_be/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
